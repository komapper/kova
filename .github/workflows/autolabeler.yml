name: Autolabeler

# Use pull_request_target (not pull_request) so the GITHUB_TOKEN keeps
# write permissions for PRs from forks. Safe because this workflow never
# checks out or runs PR code.
on:
  pull_request_target:
    types:
      - opened
      - reopened
      - synchronize

permissions:
  contents: read

jobs:
  autolabeler:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      pull-requests: write

    steps:
      - uses: release-drafter/release-drafter/autolabeler@4d75298e00d9e34c483e5ff8c68d0ea1c1940c1e # v7.5.1
